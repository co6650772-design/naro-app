<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NARO 번역기</title>

<style>
body {
  background: #000;
  color: #fff;
  text-align: center;
  font-family: sans-serif;
}

h1 {
  margin-top: 40px;
}

textarea {
  width: 80%;
  height: 120px;
  margin: 20px 0;
  border-radius: 10px;
  padding: 10px;
  font-size: 16px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
}

#output {
  margin-top: 20px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>🔥 NARO 번역기</h1>

<textarea id="input" placeholder="텍스트 입력..."></textarea><br>

<button onclick="convert()">➡️ 나로어</button>
<button onclick="resetText()">↩️ 초기화</button>
<button onclick="copyText()">📋 복사</button>

<div id="output"></div>

<script>
const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG = ["ㅏ","ㅑ","ㅓ","ㅕ","ㅗ","ㅛ","ㅜ","ㅠ","ㅡ","ㅣ","ㅐ","ㅔ","ㅚ","ㅟ","ㅢ","ㅒ","ㅖ","ㅘ","ㅙ","ㅝ"];
const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

const NARO = {
  "ㄱ":"𐔉","ㄴ":"𐔋","ㄷ":"𐔌","ㄹ":"𐔎","ㅁ":"𐔏","ㅂ":"𐔐",
  "ㅅ":"𐔒","ㅇ":"𐔘","ㅈ":"𐔕","ㅊ":"𐔖","ㅋ":"𐔆","ㅌ":"𐔍","ㅍ":"𐔑","ㅎ":"𐔔",
  "ㅏ":"𐔀","ㅓ":"𐔃","ㅗ":"𐔊","ㅜ":"𐔄","ㅡ":"𐔈","ㅣ":"𐔂","ㅐ":"𐔅","ㅔ":"𐔁"
};

function convert() {
  const input = document.getElementById("input").value;
  let result = "";

  for (let char of input) {
    const code = char.charCodeAt(0);

    if (code >= 44032 && code <= 55203) {
      const base = code - 44032;
      const cho = Math.floor(base / 588);
      const jung = Math.floor((base % 588) / 28);
      const jong = base % 28;

      const c = CHO[cho];
      const j = JUNG[jung];
      const t = JONG[jong];

      result += (NARO[c] || c) + (NARO[j] || j) + (NARO[t] || "");
    } else {
      result += char;
    }
  }

  document.getElementById("output").innerText = result;
}

function resetText() {
  document.getElementById("input").value = "";
  document.getElementById("output").innerText = "";
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("복사 완료!");
}
</script>

</body>
</html>
