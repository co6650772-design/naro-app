<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NARO 번역기</title>

<style>
body {
  background: #000;
  color: #fff;
  text-align: center;
  font-family: sans-serif;
}

textarea {
  width: 85%;
  height: 120px;
  margin: 20px 0;
  border-radius: 10px;
  padding: 10px;
  font-size: 16px;
}

button {
  margin: 8px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
}

#output {
  margin-top: 20px;
  font-size: 20px;
}

#pronounce {
  margin-top: 10px;
  font-size: 16px;
  color: #aaa;
}

#guide {
  display: none;
  margin-top: 20px;
  text-align: left;
  padding: 15px;
  background: #111;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 NARO 번역기</h1>

<textarea id="input" placeholder="텍스트 입력..."></textarea><br>

<button onclick="toNaro()">➡️ 나로어</button>
<button onclick="toKorean()">⬅️ 한국어 복원</button>
<button onclick="toggleGuide()">📖 문자표</button><br>
<button onclick="copyText()">📋 복사</button>
<button onclick="resetText()">↩️ 초기화</button>

<div id="output"></div>
<div id="pronounce"></div>

<div id="guide"></div>

<script>
// ================== 기본 ==================
const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

const JUNG = [
 "ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ",
 "ㅗ","ㅘ","ㅙ","ㅚ","ㅛ",
 "ㅜ","ㅝ","ㅞ","ㅟ","ㅠ",
 "ㅡ","ㅢ","ㅣ"
];

const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

// ================== 매핑 ==================
const map = {
 "ㄱ":["𐔉","카르"], "ㄲ":["𐔉𐔉","카카르"],
 "ㄴ":["𐔋","나르"], "ㄷ":["𐔌","다르"], "ㄸ":["𐔌𐔌","다다르"],
 "ㄹ":["𐔎","라르"], "ㅁ":["𐔏","마르"], "ㅂ":["𐔐","바르"], "ㅃ":["𐔐𐔐","바바르"],
 "ㅅ":["𐔒","사르"], "ㅆ":["𐔒𐔒","사사르"], "ㅇ":["𐔘","응르"],
 "ㅈ":["𐔕","자르"], "ㅉ":["𐔕𐔕","자자르"], "ㅊ":["𐔖","차르"],
 "ㅋ":["𐔆","카엔"], "ㅌ":["𐔍","타르"], "ㅍ":["𐔑","파르"], "ㅎ":["𐔔","하르"],

 "ㅏ":["𐔀","아르"], "ㅑ":["𐔈𐔀","에라"], "ㅓ":["𐔃","오르"],
 "ㅕ":["𐔈𐔃","에로"], "ㅗ":["𐔊","우론"], "ㅛ":["𐔈𐔊","에룬"],
 "ㅜ":["𐔄","우르"], "ㅠ":["𐔈𐔄","에루"], "ㅡ":["𐔈","에르"],
 "ㅣ":["𐔂","이르"], "ㅐ":["𐔅","아엔"], "ㅔ":["𐔁","엔"],
 "ㅚ":["𐔊𐔂","우이르"], "ㅟ":["𐔄𐔂","우이르"], "ㅢ":["𐔈𐔂","에이르"],
 "ㅒ":["𐔈𐔅","에엔"], "ㅖ":["𐔈𐔁","에네"],
 "ㅘ":["𐔊𐔀","우아"], "ㅙ":["𐔊𐔅","우엔"], "ㅝ":["𐔄𐔃","우로"]
};

const engMap = {
 "a":"ㅏ","b":"ㅂ","c":"ㄱ","d":"ㄷ","e":"ㅔ","f":"ㅍ","g":"ㅗ","h":"ㅎ",
 "i":"ㅣ","j":"ㅊ","k":"ㅋ","l":"ㄹ","m":"ㅁ","n":"ㄴ","o":"ㅓ","p":"ㅍ",
 "q":"ㅋ","r":"ㄹ","s":"ㅅ","t":"ㅌ","u":"ㅜ","v":"ㅂ","w":"ㅜ",
 "x":"ㅋ","y":"ㅡ","z":"ㅈ"
};

// 역매핑
const reverseMap = {};
for (let k in map) reverseMap[map[k][0]] = k;

// ================== 번역 ==================
function toNaro() {
  const input = document.getElementById("input").value.toLowerCase();
  let result = "", pron = "";

  for (let char of input) {
    let code = char.charCodeAt(0);

    if (code >= 44032 && code <= 55203) {
      let base = code - 44032;
      let cho = CHO[Math.floor(base / 588)];
      let jung = JUNG[Math.floor((base % 588) / 28)];
      let jong = JONG[base % 28];

      [cho, jung, jong].forEach(j=>{
        if (!j) return;
        result += map[j][0];
        pron += map[j][1] + " ";
      });
    }
    else if (engMap[char]) {
      let k = engMap[char];
      result += map[k][0];
      pron += map[k][1] + " ";
    }
    else if (map[char]) {
      result += map[char][0];
      pron += map[char][1] + " ";
    }
    else {
      result += char;
      pron += char + " ";
    }
  }

  output.innerText = result;
  pronounce.innerText = "[" + pron.trim() + "]";
}

// ================== 복원 ==================
function toKorean() {
  let input = document.getElementById("input").value;
  let keys = Object.keys(reverseMap).sort((a,b)=>b.length-a.length);

  keys.forEach(k=>{
    input = input.split(k).join(reverseMap[k]);
  });

  output.innerText = input;
  pronounce.innerText = "(복원 완료)";
}

// ================== 문자표 ==================
function toggleGuide() {
  const guide = document.getElementById("guide");

  if (guide.style.display === "none") {
    guide.style.display = "block";

    guide.innerHTML = `
    <h3>📖 NARO 문자표</h3>

    <b>🔹 자음</b><br>
    ㄱ = 𐔉 (카르)<br>
    ㄴ = 𐔋 (나르)<br>
    ㄷ = 𐔌 (다르)<br>
    ㄹ = 𐔎 (라르)<br>
    ㅁ = 𐔏 (마르)<br>
    ㅂ = 𐔐 (바르)<br>
    ㅅ = 𐔒 (사르)<br>
    ㅇ = 𐔘 (응르)<br><br>

    <b>🔹 모음</b><br>
    ㅏ = 𐔀 (아르)<br>
    ㅓ = 𐔃 (오르)<br>
    ㅗ = 𐔊 (우론)<br>
    ㅜ = 𐔄 (우르)<br>
    ㅡ = 𐔈 (에르)<br>
    ㅣ = 𐔂 (이르)<br><br>

    <b>🔹 영어</b><br>
    A = 𐔀 (아르)<br>
    B = 𐔐 (바르)<br>
    C = 𐔉 (카르)<br>
    D = 𐔌 (다르)<br>
    E = 𐔁 (엔)<br>
    `;
  } else {
    guide.style.display = "none";
  }
}

// ================== 기타 ==================
function copyText() {
  navigator.clipboard.writeText(output.innerText);
  alert("복사 완료!");
}

function resetText() {
  input.value = "";
  output.innerText = "";
  pronounce.innerText = "";
}
</script>

</body>
</html>
